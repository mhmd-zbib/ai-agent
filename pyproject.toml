[tool.uv.workspace]
members = ["packages/api", "packages/pipeline", "packages/common"]

[tool.uv.sources]
common = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["packages/common/src", "packages/api/src", "packages/pipeline/src"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
strict = true
python_version = "3.12"
