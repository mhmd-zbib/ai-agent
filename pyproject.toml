[tool.uv.workspace]
members = ["packages/*"]

[tool.pytest.ini_options]
pythonpath = ["packages/shared", "packages/api", "packages/agents", "packages/pipeline", "packages/ingestion"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
strict = true
python_version = "3.12"
