[project]
name = "agents"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "anthropic>=0.86.0",
    "scipy>=1.13.0",
    "sympy>=1.13.0",
]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agents"]
