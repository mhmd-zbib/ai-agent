[project]
name = "api"
version = "0.1.0"
description = "Agent/chat FastAPI backend"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.135.1",
    "uvicorn>=0.42.0",
    "scipy>=1.13.0",
    "sympy>=1.13.0",
    "alembic>=1.18.4",
    "pgvector>=0.4.2",
    "python-multipart>=0.0.20",
    "bcrypt>=4.0.0",
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
