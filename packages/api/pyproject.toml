[project]
name = "api"
version = "0.1.0"
description = "Agent/chat FastAPI application"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "fastapi>=0.135.1",
    "uvicorn>=0.42.0",
    "scipy>=1.13.0",
    "sympy>=1.13.0",
    "alembic>=1.18.4",
    "pgvector>=0.4.2",
    "python-multipart>=0.0.20",
]

[tool.uv.sources]
shared = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=8.3.5",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["api"]
