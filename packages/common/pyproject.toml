[project]
name = "common"
version = "0.1.0"
description = "Shared contracts, infra drivers, agents, and tools"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10.6",
    "pydantic-settings>=2.8.2",
    "structlog>=25.1.0",
    "pyjwt>=2.10.1",
    "openai>=1.59.7",
    "anthropic>=0.86.0",
    "redis>=5.2.1",
    "sqlalchemy[asyncio]>=2.0.32",
    "asyncpg>=0.31.0",
    "psycopg[binary]>=3.1.0",
    "qdrant-client>=1.12.1",
    "pinecone>=6.0.2",
    "minio>=7.2.13",
    "aio-pika>=9.5.3",
    "httpx>=0.25.0",
    "pypdf>=4.0.0",
    "python-docx>=1.1.0",
    "pymupdf>=1.27.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/common"]
