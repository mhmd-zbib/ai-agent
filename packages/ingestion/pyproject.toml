[project]
name = "ingestion"
version = "0.1.0"
description = "4-stage document ingestion pipeline with thin FastAPI wrapper"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "fastapi>=0.135.1",
    "uvicorn>=0.42.0",
    "anthropic>=0.86.0",
    "pypdf>=4.0.0",
    "python-docx>=1.1.0",
    "pymupdf>=1.27.2.2",
    "unstructured[pdf]>=0.22.6",
    "asyncpg>=0.31.0",
    "python-multipart>=0.0.20",
]

[tool.uv.sources]
shared = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=8.3.5",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ingestion"]
