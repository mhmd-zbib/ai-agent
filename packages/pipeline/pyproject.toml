[project]
name = "pipeline"
version = "0.1.0"
description = "Document ingestion pipeline worker"
requires-python = ">=3.12"
dependencies = [
    "unstructured[pdf]>=0.22.6",
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline"]
